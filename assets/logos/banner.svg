<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2d8fd5"/>
      <stop offset="100%" stop-color="#0d7c6e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" rx="8"/>

  <!-- DNA helix decoration (left) -->
  <g opacity="0.15" transform="translate(40, 20)">
    <path d="M0 0 C30 20 60 20 90 0 C120 -20 150 -20 180 0" stroke="#2d8fd5" stroke-width="2" fill="none"/>
    <path d="M0 40 C30 60 60 60 90 40 C120 20 150 20 180 40" stroke="#2d8fd5" stroke-width="2" fill="none"/>
    <path d="M0 80 C30 100 60 100 90 80 C120 60 150 60 180 80" stroke="#2d8fd5" stroke-width="2" fill="none"/>
    <line x1="30" y1="10" x2="30" y2="50" stroke="#0d7c6e" stroke-width="1.5"/>
    <line x1="60" y1="20" x2="60" y2="60" stroke="#0d7c6e" stroke-width="1.5"/>
    <line x1="90" y1="0"  x2="90" y2="40" stroke="#0d7c6e" stroke-width="1.5"/>
    <line x1="120" y1="20" x2="120" y2="60" stroke="#0d7c6e" stroke-width="1.5"/>
    <line x1="150" y1="20" x2="150" y2="60" stroke="#0d7c6e" stroke-width="1.5"/>
  </g>

  <!-- Main title -->
  <text x="260" y="90" font-family="'Segoe UI', Inter, sans-serif" font-size="52" font-weight="700"
        fill="white" letter-spacing="-1">In-Silico PCR</text>

  <!-- Subtitle -->
  <text x="262" y="128" font-family="'Segoe UI', Inter, sans-serif" font-size="20" font-weight="400"
        fill="rgba(255,255,255,0.7)">
    Thermodynamics-aware primer simulation platform
  </text>

  <!-- Tag badges -->
  <g transform="translate(262, 148)">
    <rect x="0"   y="0" width="120" height="26" rx="13" fill="rgba(45,143,213,0.25)" stroke="rgba(45,143,213,0.5)" stroke-width="1"/>
    <text x="60"  y="17" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="11" fill="#7ecbf7">SantaLucia 1998 NN</text>

    <rect x="130" y="0" width="110" height="26" rx="13" fill="rgba(13,124,110,0.25)" stroke="rgba(13,124,110,0.5)" stroke-width="1"/>
    <text x="185" y="17" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="11" fill="#6ecec4">FM-index search</text>

    <rect x="250" y="0" width="130" height="26" rx="13" fill="rgba(196,115,10,0.25)" stroke="rgba(196,115,10,0.5)" stroke-width="1"/>
    <text x="315" y="17" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="11" fill="#f5c57a">Peyret mismatches</text>

    <rect x="390" y="0" width="130" height="26" rx="13" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
    <text x="455" y="17" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="11" fill="#c4b5fd">Owczarzy Mg²⁺</text>

    <rect x="530" y="0" width="110" height="26" rx="13" fill="rgba(30,132,73,0.25)" stroke="rgba(30,132,73,0.5)" stroke-width="1"/>
    <text x="585" y="17" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="11" fill="#86efac">170 tests ✓</text>
  </g>

  <!-- Accent line -->
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent)" rx="2"/>
</svg>
